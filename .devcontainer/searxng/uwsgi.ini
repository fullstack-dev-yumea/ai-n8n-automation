[uwsgi]
# Run as the searxng user created inside the official image
uid = searxng
gid = searxng

# Silence per-request logs for privacy
disable-logging = true

# One worker per CPU core, 4 threads each
workers = %k
threads = 4

# Python plugin settings
single-interpreter = true
master = true
plugin = python3
lazy-apps = true
enable-threads = 4

# WSGI entry point
module = searx.webapp
pythonpath = /usr/local/searxng/
chdir = /usr/local/searxng/
auto-procname = true

# Bind directly on HTTP port 8080 (no nginx reverse proxy in this setup)
http = 0.0.0.0:8080

# Request handling limits
harakiri = 10
buffer-size = 8192
add-header = Connection: close
