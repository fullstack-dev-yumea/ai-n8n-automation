# SearXNG rate-limiter configuration
#
# This file intentionally relaxes bot-detection so that n8n can make
# repeated programmatic requests without being blocked.
# Only applies when server.limiter is set to true in settings.yml.
# (Currently set to false, so this file acts as a documented fallback.)

[real_ip]
  # Trust the first X-Forwarded-For hop (Codespaces / reverse proxy).
  x_for = 1
  ipv4_prefix = 32
  ipv6_prefix = 48

[botdetection.ip_limit]
  # Disable link-token enforcement — n8n requests do not carry browser tokens.
  filter_link_local = false
  link_token = false

[botdetection.ip_lists]
  pass_ip = []
  block_ip = []
