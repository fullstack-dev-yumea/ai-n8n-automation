# Docker Compose — AI Automation Stack
# Services: dev (VS Code), ollama, n8n, searxng, valkey
#
# Secrets and generated config are in .devcontainer/.env and
# .devcontainer/searxng/settings.yml — both gitignored, created
# automatically by initializeCommand.sh on first Codespace start.

services:

  # ── Main devcontainer ─────────────────────────────────────────────────────
  dev:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    command: sleep infinity
    restart: unless-stopped
    volumes:
      # The devcontainer CLI also auto-mounts the workspace; this ensures
      # the mount is available even outside of VS Code attach.
      - ..:/workspaces:cached

  # ── Ollama (LLM inference) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      # Models are stored in a named volume so they survive container restarts
      # and codespace suspensions (but NOT codespace deletion).
      - ollama-models:/root/.ollama
      # Mount this .devcontainer/ folder so the custom entrypoint is accessible
      # at /devcontainer/ollama-entrypoint.sh inside the container.
      - .:/devcontainer:ro
    entrypoint: ["/bin/bash", "/devcontainer/ollama-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Valkey (Redis-compatible cache for SearXNG) ────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── SearXNG (meta search engine) ──────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      # settings.yml (generated, gitignored) + limiter.toml + uwsgi.ini (committed)
      - ./searxng:/etc/searxng
    environment:
      # Public base URL — in Codespaces this is overridden by port forwarding
      - SEARXNG_BASE_URL=http://localhost:8080/
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── n8n (workflow automation) ──────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    # Run as uid 1000 (node) — matches the workspace owner uid in Codespaces
    # so n8n can read/write the mounted n8n-data directory.
    user: "1000:1000"
    volumes:
      # n8n-data/ lives in the workspace root so workflows are committed to git.
      # The SQLite database and binary uploads are gitignored (see .gitignore).
      - ../n8n-data:/home/node/.n8n
    env_file:
      # Generated by initializeCommand.sh — contains N8N_ENCRYPTION_KEY and WEBHOOK_URL.
      # If N8N_ENCRYPTION_KEY was set as a GitHub Codespaces Secret, it is stable
      # across codespace recreations; otherwise it is randomly generated and
      # credentials will be lost if the codespace is deleted.
      - .env
    environment:
      - N8N_PROXY_HOPS=1
      - GENERIC_TIMEZONE=UTC
    depends_on:
      - valkey
      - searxng

volumes:
  ollama-models:
    # Named volume for Ollama model files (~3.3 GB for gemma3:4b).
    # Survives container restarts and codespace suspensions.
    # LOST on codespace deletion — model will be re-downloaded on next start.
